set -sg escape-time 0
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

set-window-option -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# tmux >= 2.1
set-option -g mouse on
# tmux < 2.6
# set -g mouse-utf8 off

# tmux < 2.1
# set -g mode-mouse on
# set -g mouse-resize-pane on
# set -g mouse-select-pane on
# set -g mouse-select-window on

# tmux < 2.6
#bind-key -t vi-copy 'v' begin-selection
#bind-key -t vi-copy 'y' copy-selection
#bind-key w choose-tree -u

# tmux >= 2.6
 bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
 bind-key -T copy-mode-vi 'y' send-keys -X copy-selection
 bind-key w choose-tree


# no glyph version
# source-file ~/dotfiles/.jellybeans.tmuxnoline

source-file ~/dotfiles/.jellybeans.tmuxline

setw -g clock-mode-colour colour103

set -g default-terminal "screen-256color-bce"

set -sg escape-time 0


# Required for system notifications and accepting plan in new session context
set -g allow-passthrough on

# Enable TrueColor (24-bit) support for Claude's UI and diffs
# This tells tmux that the 'outside' terminal (iTerm2) is Tc/RGB capable
# Note: if you change your iTerm2 color settings, you might need to update this line
set -as terminal-features ",xterm-256color:RGB"

# Ensure system clipboard works seamlessly
set -s set-clipboard on

# Allow Claude to receive Shift+Enter correctly
set -s extended-keys on
bind-key -n S-Enter send-keys Escape "[13;2u"
